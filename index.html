<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panini 2026">
<title>Álbum Panini Mundial 2026</title>
<meta name="description" content="Tracker colaborativo del álbum Panini del Mundial 2026">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a18;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    color: #f0eee6;
    -webkit-tap-highlight-color: transparent;
  }
  /* Loader inicial mientras carga el iframe */
  .loader {
    position: fixed;
    inset: 0;
    background: #1a1a18;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    z-index: 10;
    transition: opacity 0.3s ease;
  }
  .loader.hide {
    opacity: 0;
    pointer-events: none;
  }
  .loader-title {
    font-size: 14px;
    color: #888780;
    letter-spacing: 0.3px;
  }
  .loader-sub {
    font-size: 11px;
    color: #555;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid rgba(255,140,26,0.15);
    border-top-color: #FF8C1A;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Wrapper del iframe — fondo negro y oculta scrollbars/banners de Google */
  .frame-wrap {
    position: fixed;
    inset: 0;
    background: #1a1a18;
    overflow: hidden;
  }
  /* Truco: corremos el iframe 52px hacia arriba para esconder la barra
     blanca de Google ("Un usuario de Google Apps Script creó esta aplicación
     · Denunciar abuso · Más información"). Le damos 52px extra de altura
     para compensar y no cortar contenido. */
  iframe {
    position: absolute;
    top: -52px;
    left: 0;
    width: 100%;
    height: calc(100% + 52px);
    border: 0;
    background: #1a1a18;
  }
  /* Pantalla muy pequeña: el banner de Google a veces es más alto */
  @media (max-width: 400px) {
    iframe { top: -56px; height: calc(100% + 56px); }
  }
</style>
</head>
<body>
<div class="frame-wrap">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-title">Álbum Panini Mundial 2026</div>
    <div class="loader-sub">Cargando…</div>
  </div>
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbxb6U2M25Ah4ZyWu_C8PCQQGzpFzFs6a2VOsmDhTgehVi8V1tUm66LxYKntDFCx9H-6eg/exec"
    allow="clipboard-read; clipboard-write; web-share"
    allowfullscreen
    title="Álbum Panini Mundial 2026">
  </iframe>
</div>
<script>
  // Esconde el loader cuando el iframe termina de cargar
  document.getElementById('app').addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loader').classList.add('hide');
    }, 200);
  });
  // Fallback: por si el evento load no dispara, esconde el loader a los 6s
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
  }, 6000);
</script>
</body>
</html>
